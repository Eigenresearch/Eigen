name: Release Build

on:
  push:
    tags:
      - 'v2.*'

permissions:
  contents: write

jobs:
  test-and-bench:
    name: Run Tests and Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run Test Suite
        run: |
          pytest --cov=src > test_output.log 2>&1 || (cat test_output.log && exit 1)

      - name: Push Test Log on Failure
        if: failure()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout -b test-failures
          git add test_output.log
          git commit -m "Upload test failure log"
          git push -f origin test-failures

      - name: Run Benchmark Suite
        run: |
          python src/main.py bench

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: test-and-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Build Windows Installer
        run: |
          python scripts/build_installers.py > win_build.log 2>&1
          if ($LASTEXITCODE -ne 0) { type win_build.log; exit 1 }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: dist/Eigen-*-Windows-x64.exe

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: test-and-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Install appimagetool dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 wget

      - name: Build Linux AppImage
        run: |
          python scripts/build_installers.py > linux_build.log 2>&1 || (cat linux_build.log && exit 1)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-AppImage
          path: dist/Eigen-*-Linux.AppImage

  build-macos:
    name: Build macOS PKG
    runs-on: macos-latest
    needs: test-and-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Build macOS PKG
        run: |
          python scripts/build_installers.py > mac_build.log 2>&1 || (cat mac_build.log && exit 1)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-PKG
          path: dist/Eigen-*-macOS.pkg

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-Installer
          path: dist/

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Linux-AppImage
          path: dist/

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macOS-PKG
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Eigen-*-Windows-x64.exe
            dist/Eigen-*-Linux.AppImage
            dist/Eigen-*-macOS.pkg
          body: |
            # Eigen ${{ steps.version.outputs.VERSION }} Release

            Welcome to the latest release of **Eigen** — a runtime-first hybrid classical-quantum programming language.

            ## Installers
            | Platform | File | Notes |
            |---|---|---|
            | **Windows x64** | `Eigen-*-Windows-x64.exe` | Standalone — no Python required |
            | **Linux x86_64** | `Eigen-*-Linux.AppImage` | Run with `chmod +x` then execute |
            | **macOS** | `Eigen-*-macOS.pkg` | Double-click to install to `/usr/local/bin` |

            ## Quick Start
            ```bash
            # Run a quantum program
            eigen run examples/bell.eig --trace

            # Compile to standalone native binary
            eigen build examples/bell.eig --aot --opt-level O2

            # Generate QIR-compatible LLVM IR
            eigen build examples/qft.eig --qir

            # Check environment health
            eigen doctor

            # Run full test suite
            eigen test
            ```

            ## What's New in 2.4 — Mone
            - **Zero-Copy Rust Frontend** — 9.7× faster parsing (1k LOC), 4.2× on 100k LOC
            - **Native SIMD Simulator Kernels** — Rayon + AVX2/AVX512 gate execution
            - **Salsa Incremental Cache** — SHA-256 content hashing, skips unchanged compile steps
            - **JIT v2** — LICM, constant folding, type guards, deoptimization paths
            - **Standalone AOT Compiler** — `eigen build --aot` produces `.exe` with no Python runtime
            - **QIR Output** — `eigen build --qir` emits opaque-pointer QIR LLVM IR
            - **MSVC Compatibility** — `/RELEASE` flag, no LTCG conflicts on Windows

            ## Performance vs 2.3
            | Benchmark | VM | AOT | Speedup |
            |---|---|---|---|
            | fib(22) classical | 411 ms | 22 ms | **18×** |
            | Bell pair 500 shots | 125 ms | 9 ms | **13×** |
            | Grover 2-qubit 500 iter | 138 ms | 10 ms | **13×** |
            | factorial(12) × 10000 | 917 ms | 20 ms | **44×** |

            ## Bug Fixes
            - Fixed MSVC linker LNK2005 (LTCG static library conflicts)
            - Fixed Windows cross-drive `os.path.relpath` ValueError (D: ↔ C:)
            - Fixed stale AST cache (NTFS mtime resolution → SHA-256 hashing)
            - Fixed early dependency reset in `QueryDb.execute_query`
            - Fixed MPS `RZ` gate `NameError` (missing `cmath` import)
            - Fixed JIT cache cleared per-run (now global LRU by function_hash+block_id)

            ## Full Changelog
            See [CHANGELOG.md](https://github.com/Eigenresearch/Eigen/blob/main/CHANGELOG.md) for complete details.

            ## Documentation
            - [Language Specification](https://github.com/Eigenresearch/Eigen/blob/main/LANGUAGE.md)
            - [Architecture](https://github.com/Eigenresearch/Eigen/blob/main/docs/architecture.md)
            - [Examples Guide](https://github.com/Eigenresearch/Eigen/blob/main/docs/examples-guide.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
