name: Release Build

on:
  push:
    tags:
      - 'v2.3.*'

permissions:
  contents: write

jobs:
  test-and-bench:
    name: Run Tests and Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run Test Suite
        run: |
          python -m unittest discover -s tests -v > test_output.log 2>&1

      - name: Push Test Log on Failure
        if: failure()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout -b test-failures
          git add test_output.log
          git commit -m "Upload test failure log"
          git push -f origin test-failures

      - name: Run Benchmark Suite
        run: |
          python src/main.py bench

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: test-and-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Build Windows Installer
        run: |
          python scripts/build_installers.py > win_build.log 2>&1 || (type win_build.log && exit 1)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: dist/Eigen-2.3-Windows-x64.exe

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: test-and-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Install appimagetool dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 wget

      - name: Build Linux AppImage
        run: |
          python scripts/build_installers.py > linux_build.log 2>&1 || (cat linux_build.log && exit 1)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-AppImage
          path: dist/Eigen-2.3-Linux.AppImage

  build-macos:
    name: Build macOS PKG
    runs-on: macos-latest
    needs: test-and-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Build macOS PKG
        run: |
          python scripts/build_installers.py > mac_build.log 2>&1 || (cat mac_build.log && exit 1)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-PKG
          path: dist/Eigen-2.3-macOS.pkg

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-Installer
          path: dist/

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Linux-AppImage
          path: dist/

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macOS-PKG
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Eigen-2.3-Windows-x64.exe
            dist/Eigen-2.3-Linux.AppImage
            dist/Eigen-2.3-macOS.pkg
          body: |
            # Eigen 2.3 — Helios Release
            
            Welcome to Eigen 2.3 — Helios!
            
            This is a stabilized, performance-oriented, runtime-first hybrid classical-quantum programming language platform designed for serious development, research workloads, scalable experimentation, and transparent backend compatibility.
            
            ### Key Features
            - **MLIR Dialect Layer:** AST -> MLIR Dialects (func, arith, quantum, cf) -> EQIR DAG translation.
            - **GPU Engine 2.0:** Integrated support for CUDA, ROCm, and Metal with automatic platform detection (`eigen run --gpu auto`).
            - **Quantum Tensor Compiler:** Advanced simulation of large low-entanglement circuits via tensor graph optimizer.
            - **Concurrency Scheduler:** Parallel block structures (`parallel { task f() }`) executed using a DAG scheduler.
            - **LLVM / QIR Target:** Native compilation support mapping SSA forms directly to LLVM IR (`eigen build --llvm`).
            - **Incremental Compiler Caching:** Fast caching of compile targets (AST, SSA, EQIR, ZX, EBC) inside `.eigen_cache/` to speed up rebuilds.
            
            ### Installers
            - **Windows:** `Eigen-2.3-Windows-x64.exe`
            - **Linux:** `Eigen-2.3-Linux.AppImage`
            - **macOS:** `Eigen-2.3-macOS.pkg`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
