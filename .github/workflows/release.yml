name: Release Build

on:
  push:
    tags:
      - 'v2.*'

permissions:
  contents: write

jobs:
  test-and-bench:
    name: Run Tests and Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run Test Suite
        run: |
          pytest --cov=src -q --tb=short > test_output.log 2>&1 || (cat test_output.log && exit 1)

      - name: Push Test Log on Failure
        if: failure()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout -b test-failures
          git add test_output.log
          git commit -m "Upload test failure log"
          git push -f origin test-failures

      - name: Run Benchmark Suite
        run: |
          python src/main.py bench

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: test-and-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Build Windows Installer
        run: |
          python scripts/build_installers.py > win_build.log 2>&1
          if ($LASTEXITCODE -ne 0) { type win_build.log; exit 1 }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: dist/Eigen-*-Windows-x64.exe

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: test-and-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Install appimagetool dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 wget

      - name: Build Linux AppImage
        run: |
          python scripts/build_installers.py > linux_build.log 2>&1 || (cat linux_build.log && exit 1)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux-AppImage
          path: dist/Eigen-*-Linux.AppImage

  build-macos:
    name: Build macOS PKG
    runs-on: macos-latest
    needs: test-and-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Build macOS PKG
        run: |
          python scripts/build_installers.py > mac_build.log 2>&1 || (cat mac_build.log && exit 1)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-PKG
          path: dist/Eigen-*-macOS.pkg

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows-Installer
          path: dist/

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Linux-AppImage
          path: dist/

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macOS-PKG
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Eigen-*-Windows-x64.exe
            dist/Eigen-*-Linux.AppImage
            dist/Eigen-*-macOS.pkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-docs:
    name: Deploy Versioned Docs
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material mike

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy Docs
        run: |
          git fetch origin gh-pages --depth=1 || true
          mike deploy --push --update-aliases ${GITHUB_REF_NAME} latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

